<!DOCTYPE html>
<html>
<head>
<title>Food Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">
<a class="navbar-brand" href="#">FoodHub</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item dropdown">
<a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">
Menu
</a>

<ul class="dropdown-menu">
<li><a class="dropdown-item" href="#">Pizza</a></li>
<li><a class="dropdown-item" href="#">Burger</a></li>
</ul>
</li>
</ul>
</div>
</div>
</nav>

<!-- Breadcrumb -->
<div class="container mt-3">
<nav>
<ol class="breadcrumb">
<li class="breadcrumb-item"><a href="#">Home</a></li>
<li class="breadcrumb-item active">Food</li>
</ol>
</nav>
</div>

<!-- Responsive Grid -->
<div class="container">
<div class="row">

<div class="col-md-6">
<div class="card">
<img src="https://picsum.photos/300/200?1" class="card-img-top">
<div class="card-body">
<h5>Pizza</h5>
<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#foodModal">
Order
</button>
</div>
</div>
</div>

<div class="col-md-6 mt-3 mt-md-0">
<div class="card">
<img src="https://picsum.photos/300/200?2" class="card-img-top">
<div class="card-body">
<h5>Burger</h5>
<button class="btn btn-success">Order</button>
</div>
</div>
</div>

</div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="foodModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Order Form</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="text" class="form-control" placeholder="Enter Name">
</div>

<div class="modal-footer">
<button class="btn btn-success">Submit</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
